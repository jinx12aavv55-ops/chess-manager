<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Manager — Liga Internacional</title>
<style>
:root{--bg:#0f1117;--bg2:#181b24;--bg3:#1e2230;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#e8e6df;--text2:#9b9890;--text3:#5f5d58;--green:#1d9e75;--green-bg:#0d2e20;--green-text:#4dd4a0;--blue:#2d7dd2;--blue-bg:#0d1e35;--blue-text:#7db8f0;--amber:#c98a1a;--amber-bg:#2a1e08;--amber-text:#f0b84a;--red:#c0392b;--red-bg:#2e0d0a;--red-text:#f07070;--purple:#6c5ce7;--purple-bg:#1a1535;--purple-text:#a89af0;--teal-bg:#0d2828;--teal-text:#4dd4c0;--gray-bg:#1e2028;--gray-text:#9b9890;--radius:10px;--radius-sm:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:52px;position:sticky;top:0;z-index:100}
.logo{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.coins-display{font-size:13px;font-weight:600;color:var(--amber-text);background:var(--amber-bg);padding:4px 12px;border-radius:20px;border:1px solid var(--amber)}
.season-info{font-size:12px;color:var(--text2)}
nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 1.5rem}
nav::-webkit-scrollbar{display:none}
.nav-btn{padding:12px 16px;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.nav-btn.active{color:var(--text);border-bottom-color:var(--blue)}
.nav-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red);margin-left:4px;vertical-align:middle}
main{max-width:720px;margin:0 auto;padding:1.5rem 1rem}
.screen{display:none}.screen.active{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1rem}
.card-title{font-size:13px;font-weight:600;margin-bottom:.875rem;display:flex;justify-content:space-between;align-items:center}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;text-align:center}
.stat-val{font-size:20px;font-weight:700}.stat-lbl{font-size:11px;color:var(--text2);margin-top:2px}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px}
.badge-gm{background:var(--purple-bg);color:var(--purple-text);border:1px solid var(--purple)}
.badge-im{background:var(--blue-bg);color:var(--blue-text);border:1px solid var(--blue)}
.badge-fm{background:var(--teal-bg);color:var(--teal-text);border:1px solid #1d7a7a}
.badge-cm{background:var(--gray-bg);color:var(--gray-text);border:1px solid #333}
.badge-green{background:var(--green-bg);color:var(--green-text);border:1px solid var(--green)}
.badge-blue{background:var(--blue-bg);color:var(--blue-text);border:1px solid var(--blue)}
.badge-amber{background:var(--amber-bg);color:var(--amber-text);border:1px solid var(--amber)}
.badge-red{background:var(--red-bg);color:var(--red-text);border:1px solid var(--red)}
.badge-gray{background:var(--gray-bg);color:var(--gray-text);border:1px solid #333}
.badge-teal{background:var(--teal-bg);color:var(--teal-text);border:1px solid #1d7a7a}
.prow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.prow:last-child{border-bottom:none}
.pnum{font-size:11px;color:var(--text3);width:14px;text-align:center;font-weight:600;flex-shrink:0}
.pflag{font-size:16px;flex-shrink:0}.pinfo{flex:1;min-width:0}
.pname{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pmeta{font-size:11px;color:var(--text2);margin-top:1px}
.elo-pill{font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--bg3);border:1px solid var(--border2);flex-shrink:0}
.btn{display:inline-flex;align-items:center;padding:7px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:transparent;cursor:pointer;font-size:12px;font-weight:500;color:var(--text)}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-danger{border-color:var(--red);color:var(--red-text)}
.btn-sm{padding:3px 9px;font-size:11px}
.btn-full{width:100%;justify-content:center;padding:11px;font-size:14px}
.bonus-chip{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;background:var(--teal-bg);color:var(--teal-text);border:1px solid #1d7a7a;margin:2px}
.lrow{display:flex;align-items:center;gap:5px;padding:6px 2px;border-bottom:1px solid var(--border);font-size:13px}
.lrow:last-child{border-bottom:none}
.lrow.me{font-weight:600;background:rgba(45,125,210,.07);border-radius:var(--radius-sm);padding-left:6px}
.lpos{width:18px;text-align:center;font-size:11px;color:var(--text3);font-weight:700;flex-shrink:0}
.lname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lpts{width:26px;text-align:center;font-weight:700;flex-shrink:0}
.lmini{width:20px;text-align:center;color:var(--text2);font-size:12px;flex-shrink:0}
.asc{color:var(--green-text);font-size:10px}.desc{color:var(--red-text);font-size:10px}
.board-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.board-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px}
.board-num{font-size:10px;font-weight:700;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.bplayer{font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.belo{font-size:10px;color:var(--text2)}
.board-result{font-size:12px;font-weight:700;text-align:center;padding:4px 0;border-radius:var(--radius-sm);margin-top:6px}
.res-win{background:var(--green-bg);color:var(--green-text);border:1px solid var(--green)}
.res-draw{background:var(--amber-bg);color:var(--amber-text);border:1px solid var(--amber)}
.res-loss{background:var(--red-bg);color:var(--red-text);border:1px solid var(--red)}
.mrow{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)}
.mrow:last-child{border-bottom:none}
.prob-bar{display:flex;height:4px;border-radius:2px;overflow:hidden;gap:1px;margin-top:4px}
.score-big{font-size:28px;font-weight:800}
.rrow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.rrow:last-child{border-bottom:none}
.revrow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.revrow:last-child{border-bottom:none}
.up{color:var(--green-text);font-weight:700}.down{color:var(--red-text);font-weight:700}.flat{color:var(--text3)}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text2)}
.empty p{font-size:14px;margin-bottom:1rem}
@media(max-width:480px){.board-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="logo"><span style="font-size:22px">♟</span> Chess Manager</div>
  <div class="header-right">
    <span class="season-info">T<span id="snum">1</span> · R<span id="rnum">0</span>/10</span>
    <span class="coins-display">⚡ <span id="cdisp">600</span></span>
  </div>
</header>
<nav>
  <button class="nav-btn active" onclick="showTab('squad')">Plantilla</button>
  <button class="nav-btn" id="tab-match" onclick="showTab('match')">Encuentro</button>
  <button class="nav-btn" onclick="showTab('league')">Liga</button>
  <button class="nav-btn" onclick="showTab('market')">Mercado</button>
  <button class="nav-btn" onclick="showTab('season')">Temporada</button>
</nav>
<main>
  <div id="squad" class="screen active"></div>
  <div id="match" class="screen"></div>
  <div id="league" class="screen"></div>
  <div id="market" class="screen"></div>
  <div id="season" class="screen"></div>
</main>
<script>
const CTRS=[{n:'India',f:'🇮🇳',c:'IND'},{n:'Rusia',f:'🇷🇺',c:'RUS'},{n:'China',f:'🇨🇳',c:'CHN'},{n:'EE.UU.',f:'🇺🇸',c:'USA'},{n:'Armenia',f:'🇦🇲',c:'ARM'},{n:'Noruega',f:'🇳🇴',c:'NOR'},{n:'Francia',f:'🇫🇷',c:'FRA'},{n:'Alemania',f:'🇩🇪',c:'GER'},{n:'España',f:'🇪🇸',c:'ESP'},{n:'Polonia',f:'🇵🇱',c:'POL'},{n:'Uzbekistán',f:'🇺🇿',c:'UZB'},{n:'Ucrania',f:'🇺🇦',c:'UKR'},{n:'Hungría',f:'🇭🇺',c:'HUN'},{n:'Azerbaiyán',f:'🇦🇿',c:'AZE'},{n:'P. Bajos',f:'🇳🇱',c:'NED'},{n:'Georgia',f:'🇬🇪',c:'GEO'},{n:'Israel',f:'🇮🇱',c:'ISR'},{n:'R. Checa',f:'🇨🇿',c:'CZE'},{n:'Rumanía',f:'🇷🇴',c:'ROU'},{n:'Serbia',f:'🇷🇸',c:'SRB'},{n:'Cuba',f:'🇨🇺',c:'CUB'},{n:'Brasil',f:'🇧🇷',c:'BRA'},{n:'Irán',f:'🇮🇷',c:'IRI'},{n:'Turquía',f:'🇹🇷',c:'TUR'},{n:'Argentina',f:'🇦🇷',c:'ARG'},{n:'Vietnam',f:'🇻🇳',c:'VIE'},{n:'Bulgaria',f:'🇧🇬',c:'BUL'},{n:'Egipto',f:'🇪🇬',c:'EGY'},{n:'Eslovaquia',f:'🇸🇰',c:'SVK'},{n:'Perú',f:'🇵🇪',c:'PER'}];
const FN=['Magnus','Fabiano','Ian','Hikaru','Alireza','Wesley','Levon','Anish','Nodirbek','Daniil','Maxime','Alexei','Peter','Sergey','Viswanathan','Bu','Wei','Gukesh','Pragg','Arjun','Vincent','Ding','Jan','Boris','Eduardo','Pablo','David','Carlos','Lucas','Andrei','Dmitri','Nikita','Pavel','Ivan','Aleksandr','Li','Zhang','Wang','Rauf','Shahriyar','Teimour','Emil','Krishnan','Vidit','Pentala','Leinier','Rodolfo','Jorge','Rafael','Saul'];
const LN=['Carlsen','Caruana','Nepomniachtchi','Nakamura','Firouzja','So','Aronian','Giri','Abdusattorov','Dubov','Vachier-Lagrave','Shirov','Svidler','Karjakin','Anand','Xiangzhi','Yi','Donnarumma','Erigaisi','Kalyan','Keymer','Liren','Duda','Gelfand','Iturrizaga','Lafuente','Antón','Álvarez','Fernández','Popescu','Andreikin','Vitiugov','Ponkratov','Lysyj','Kobalia','Chao','Zhong','Hao','Mamedov','Mamedyarov','Radjabov','Safarli','Sasikiran','Gujrathi','Harikrishna','Dominguez','Pichot','Peralta','Felgaer','Criado'];
const TNAMES=['Leningrado FC','Sicilian Dragons','Indian Defense','Ruy López United','King Gambit CF','Nimzo Warriors','Dragon Siciliano','Caro-Kann City','French Connection','The Gambiteers'];
const TITLES=['GM','GM','GM','GM','GM','IM','IM','FM','FM','CM'];
let mySquad=[],mkt=[],lg=[],hist=[];
let coins=600,rn0=0,lastM=null,sdone=false,snum=1,pid=0,usedN=new Set();
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pk(a){return a[Math.floor(Math.random()*a.length)];}
function un(){let n,t=0;do{n=pk(FN)+' '+pk(LN);t++;}while(usedN.has(n)&&t<60);usedN.add(n);return n;}
function mkP(mn,mx,ctr){const c=ctr||pk(CTRS);const age=ri(15,46),elo=ri(mn,mx);const ti=Math.min(TITLES.length-1,Math.floor((2800-elo)/100));return{id:pid++,name:un(),country:c.n,flag:c.f,code:c.c,age,elo,eloF:elo,title:TITLES[ti]||'CM',form:parseFloat((Math.random()*.22-.11).toFixed(2)),price:Math.max(30,Math.floor(elo/10)*10-ri(5,25))};}
function calcP(p){const a=p.age<=20?100:p.age<=24?65:p.age<=29?25:p.age<=34?0:p.age<=40?-55:-110;return p.eloF+a+Math.round((p.form||0)*140);}
function bon(sq){if(!sq.length)return{chips:[]};const cg={};sq.forEach(p=>{cg[p.code]=(cg[p.code]||0)+1;});const top=Object.entries(cg).sort((a,b)=>b[1]-a[1])[0];const mx=top?top[1]:0;const comp=mx>=6?300:mx>=5?220:mx>=4?150:mx>=3?80:mx>=2?30:0;const jov=sq.filter(p=>p.age<=20).length*65;const chips=[];if(comp>0){const cf=sq.find(p=>p.code===top[0]);chips.push((cf?cf.flag:'')+' '+top[0]+' ('+mx+') +'+comp);}if(jov>0)chips.push('Promesas +'+jov);return{chips};}
function avgE(sq){return sq.length?Math.round(sq.reduce((s,p)=>s+p.eloF,0)/sq.length):0;}
function simB(m,o){const diff=calcP(m)-calcP(o);const win=Math.min(82,Math.max(14,50+diff/18));const r=ri(1,100);const res=r<=win?'W':r<=win+21?'D':'L';return{mine:m,opp:o,myElo:m.eloF,oppElo:o.eloF,res,pts:res==='W'?1:res==='D'?.5:0};}
function ageL(age){if(age<=20)return{t:'Promesa',c:'badge-green'};if(age<=25)return{t:'Joven',c:'badge-teal'};if(age<=30)return{t:'Prime',c:'badge-blue'};if(age<=37)return{t:'Veterano',c:'badge-amber'};return{t:'Leyenda',c:'badge-gray'};}
function tCls(t){return t==='GM'?'badge-gm':t==='IM'?'badge-im':t==='FM'?'badge-fm':'badge-cm';}
function updH(){document.getElementById('cdisp').textContent=coins;document.getElementById('rnum').textContent=rn0;document.getElementById('snum').textContent=snum;}
function updDot(){const t=document.getElementById('tab-match');t.innerHTML='Encuentro'+(mySquad.length===8&&rn0<10&&!sdone?'<span class="nav-dot"></span>':'');}
function init(){const pool=[];for(let i=0;i<80;i++)pool.push(mkP(2500,2820));for(let i=0;i<120;i++)pool.push(mkP(2300,2500));for(let i=0;i<150;i++)pool.push(mkP(2000,2300));for(let i=0;i<80;i++)pool.push(mkP(1500,2000));const el=pool.filter(p=>p.elo<=2200).sort(()=>Math.random()-.5);mySquad=el.slice(0,8);const ids=new Set(mySquad.map(p=>p.id));mkt=pool.filter(p=>!ids.has(p.id)).sort(()=>Math.random()-.5);lg=TNAMES.map(n=>({name:n,pts:ri(2,22),w:ri(0,7),d:ri(0,4),l:ri(0,5),gd:ri(-10,10),isMe:false}));lg.push({name:'Tu equipo',pts:0,w:0,d:0,l:0,gd:0,isMe:true});lg.sort((a,b)=>b.pts-a.pts);updH();updDot();rAll();}
function rAll(){rSq();rLg();rMkt();rSeas();}
function rSq(){const avg=avgE(mySquad);const{chips}=bon(mySquad);const s=[...mySquad].sort((a,b)=>b.eloF-a.eloF);const rows=s.map((p,i)=>{const al=ageL(p.age);const fc=p.form>=0?'var(--green-text)':'var(--red-text)';const fs=(p.form>=0?'+':'')+Math.round(p.form*100)+'%';return'<div class="prow"><span class="pnum">'+(i+1)+'</span><span class="pflag">'+p.flag+'</span><div class="pinfo"><div class="pname">'+p.name+'</div><div class="pmeta">'+p.country+' · '+p.age+'a · <span style="color:'+fc+';font-weight:600">'+fs+'</span></div></div><span class="badge '+tCls(p.title)+'">'+p.title+'</span><span class="badge '+al.c+'" style="margin-left:2px">'+al.t+'</span><span class="elo-pill">'+p.eloF+'</span><button class="btn btn-sm btn-danger" onclick="sell('+p.id+')">Vender</button></div>';}).join('');document.getElementById('squad').innerHTML='<div class="stat-grid"><div class="stat-card"><div class="stat-val" style="color:var(--blue-text)">'+(avg||'—')+'</div><div class="stat-lbl">ELO medio</div></div><div class="stat-card"><div class="stat-val">'+mySquad.length+'/8</div><div class="stat-lbl">Jugadores</div></div><div class="stat-card"><div class="stat-val" style="color:var(--amber-text)">'+coins+'</div><div class="stat-lbl">Monedas</div></div></div>'+(chips.length?'<div style="margin-bottom:.75rem">'+chips.map(c=>'<span class="bonus-chip">'+c+'</span>').join('')+'</div>':'')+'<div class="card"><div class="card-title">Plantilla mundial <span style="font-size:11px;color:var(--text2);font-weight:400">Tablero 1→8 por ELO</span></div>'+(rows||'<div class="empty"><p>Sin jugadores.</p></div>')+'</div>'+(mySquad.length===8&&!sdone?'<button class="btn btn-primary btn-full" onclick="showTab('match')">Ir al encuentro — ronda '+(rn0+1)+' →</button>':'');}
function rMatch(){const el=document.getElementById('match');if(lastM){rRes(el);return;}if(sdone){el.innerHTML='<div class="card"><div class="empty"><p>Temporada finalizada.</p><button class="btn btn-primary" onclick="showTab('season')">Ver revalorización →</button></div></div>';return;}if(mySquad.length!==8){el.innerHTML='<div class="card"><div class="empty"><p>Plantilla incompleta ('+mySquad.length+'/8).</p><button class="btn btn-primary" onclick="showTab('market')">Ir al mercado →</button></div></div>';return;}if(rn0>=10){sdone=true;updDot();rAll();rMatch();return;}const rivals=lg.filter(t=>!t.isMe);const opp=rivals[rn0%rivals.length];const myS=[...mySquad].sort((a,b)=>b.eloF-a.eloF);const opp8=[];for(let i=0;i<8;i++)opp8.push(mkP(avgE(mySquad)-180,avgE(mySquad)+220));const oppS=opp8.sort((a,b)=>b.elo-a.elo);const prev=myS.map((p,i)=>{const op=oppS[i];const diff=calcP(p)-calcP({...op,eloF:op.elo,form:0});const win=Math.round(Math.min(82,Math.max(14,50+diff/18)));const draw=21,loss=Math.max(0,100-win-draw);const col=win>52?'var(--green-text)':win<38?'var(--red-text)':'var(--amber-text)';return'<div class="prow" style="padding:6px 0"><span class="pnum">'+(i+1)+'</span><span class="pflag">'+p.flag+'</span><div class="pinfo"><div class="pname">'+p.name+' <span style="color:var(--text2);font-weight:400">'+p.eloF+'</span></div><div class="pmeta">vs '+op.flag+' '+op.name+' '+op.elo+'</div><div class="prob-bar"><div style="flex:'+win+';background:var(--green)"></div><div style="flex:'+draw+';background:var(--amber)"></div><div style="flex:'+loss+';background:var(--red)"></div></div></div><span style="font-size:12px;font-weight:700;color:'+col+';flex-shrink:0;min-width:30px;text-align:right">'+win+'%</span></div>';}).join('');el.innerHTML='<div class="card"><div class="card-title">Ronda '+(rn0+1)+'/10 vs '+opp.name+' <span style="font-size:12px;color:var(--text2);font-weight:400">ELO: '+avgE(mySquad)+'</span></div>'+prev+'<p style="font-size:11px;color:var(--text3);margin-top:.75rem">Verde=victoria · Naranja=tablas · Rojo=derrota</p></div><button class="btn btn-primary btn-full" onclick="playM(''+opp.name+'')">⚔️ Jugar encuentro</button>';}
function playM(oppName){if(mySquad.length!==8||rn0>=10)return;const myS=[...mySquad].sort((a,b)=>b.eloF-a.eloF);const opp8=[];for(let i=0;i<8;i++){const p=mkP(avgE(mySquad)-180,avgE(mySquad)+250);p.eloF=p.elo;opp8.push(p);}const oppS=opp8.sort((a,b)=>b.eloF-a.eloF);const boards=myS.map((p,i)=>simB(p,oppS[i]));const myPts=boards.reduce((s,b)=>s+b.pts,0);const oppPts=8-myPts;const res=myPts>oppPts?'W':myPts<oppPts?'L':'D';const lp=res==='W'?3:res==='D'?1:0;const reward=res==='W'?90:res==='D'?40:15;coins+=reward;rn0++;const mi=lg.findIndex(t=>t.isMe);lg[mi].pts+=lp;lg[mi][res==='W'?'w':res==='D'?'d':'l']++;mySquad.forEach(p=>{p.form=parseFloat(Math.max(-.18,Math.min(.18,p.form+(Math.random()*.08-.04))).toFixed(2));});lastM={boards,myPts,oppPts,res,oppName,lp,reward,round:rn0};hist.push(lastM);if(rn0>=10)sdone=true;updH();updDot();rAll();showTab('match');}
function rRes(el){const d=lastM;const mrl=d.res==='W'?'Victoria':d.res==='D'?'Empate':'Derrota';const mrc=d.res==='W'?'badge-green':d.res==='D'?'badge-amber':'badge-red';const bc=d.boards.map((b,i)=>{const rc=b.res==='W'?'res-win':b.res==='D'?'res-draw':'res-loss';const rl=b.res==='W'?'1 — 0':b.res==='D'?'½ — ½':'0 — 1';const ed=b.myElo-b.oppElo;const es=(ed>0?'+':'')+ed;const ec=ed>=0?'var(--green-text)':'var(--red-text)';return'<div class="board-card"><div class="board-num">Tablero '+(i+1)+'</div><div style="display:flex;justify-content:space-between;gap:4px"><div style="flex:1;min-width:0"><div class="bplayer">'+b.mine.flag+' '+b.mine.name+'</div><div class="belo">'+b.myElo+'</div></div><span style="font-size:10px;color:'+ec+';font-weight:700;flex-shrink:0">'+es+'</span><div style="flex:1;min-width:0;text-align:right"><div class="bplayer">'+b.opp.flag+' '+b.opp.name+'</div><div class="belo">'+b.oppElo+'</div></div></div><div class="board-result '+rc+'">'+rl+'</div></div>';}).join('');el.innerHTML='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem"><div><div style="font-size:12px;color:var(--text2);margin-bottom:4px">Ronda '+d.round+' · vs '+d.oppName+'</div><span class="badge '+mrc+'" style="font-size:13px;padding:4px 14px">'+mrl+'</span></div><div style="text-align:center"><div style="display:flex;align-items:baseline;gap:4px"><span class="score-big" style="color:var(--green-text)">'+d.myPts+'</span><span style="font-size:18px;color:var(--text3)">—</span><span class="score-big" style="color:var(--red-text)">'+d.oppPts+'</span></div><div style="font-size:11px;color:var(--text2)">de 8 puntos</div></div></div><div class="stat-grid" style="margin-bottom:0"><div class="stat-card"><div class="stat-val" style="color:var(--green-text)">'+d.boards.filter(b=>b.res==='W').length+'</div><div class="stat-lbl">Ganados</div></div><div class="stat-card"><div class="stat-val" style="color:var(--amber-text)">'+d.boards.filter(b=>b.res==='D').length+'</div><div class="stat-lbl">Tablas</div></div><div class="stat-card"><div class="stat-val" style="color:var(--amber-text)">+'+d.reward+'</div><div class="stat-lbl">Monedas</div></div></div></div><div class="board-grid">'+bc+'</div>'+(sdone?'<button class="btn btn-primary btn-full" onclick="showTab('season')">Ver revalorización →</button>':'<button class="btn btn-primary btn-full" onclick="nxtR()">Siguiente ronda '+(d.round+1)+' →</button>');}
function nxtR(){lastM=null;rMatch();}
function rLg(){const s=[...lg].sort((a,b)=>b.pts-a.pts||b.gd-a.gd);const rows=s.map((t,i)=>{const pos=i+1;const mk=pos<=2?'<span class="asc">▲</span>':pos>=10?'<span class="desc">▼</span>':'';return'<div class="lrow '+(t.isMe?'me':'')+'"><span class="lpos">'+pos+'</span><span class="lname">'+(t.isMe?'<strong>'+t.name+'</strong>':t.name)+' '+mk+'</span><span class="lmini">'+t.w+'</span><span class="lmini">'+t.d+'</span><span class="lmini">'+t.l+'</span><span class="lpts">'+t.pts+'</span></div>';}).join('');const h=hist.map(r=>{const cl=r.res==='W'?'badge-green':r.res==='D'?'badge-amber':'badge-red';const lb=r.res==='W'?'Victoria':r.res==='D'?'Empate':'Derrota';return'<div class="rrow"><span style="color:var(--text3);font-weight:700;width:22px">R'+r.round+'</span><span style="flex:1">vs '+r.oppName+'</span><span style="font-weight:700">'+r.myPts+' – '+r.oppPts+'</span><span class="badge '+cl+'">'+lb+'</span></div>';}).join('');document.getElementById('league').innerHTML='<div class="card"><div class="card-title">Liga Internacional · Div. 1 <span style="font-size:11px;color:var(--text2);font-weight:400">Ronda '+rn0+'/10</span></div><div style="display:flex;gap:5px;font-size:11px;color:var(--text3);margin-bottom:4px;padding:0 2px"><span style="width:18px"></span><span style="flex:1">Equipo</span><span style="width:20px;text-align:center">G</span><span style="width:20px;text-align:center">E</span><span style="width:20px;text-align:center">P</span><span style="width:26px;text-align:center">Pts</span></div>'+rows+'</div>'+(h?'<div class="card"><div class="card-title">Mis resultados</div>'+h+'</div>':'<div class="card"><div class="empty"><p>Sin resultados aún.</p></div></div>');}
function rMkt(){const byE=[...mkt].sort((a,b)=>b.elo-a.elo);const rows=byE.slice(0,20).map(p=>{const al=ageL(p.age);const can=coins>=p.price&&mySquad.length<8;return'<div class="mrow"><span class="pflag">'+p.flag+'</span><div class="pinfo"><div class="pname">'+p.name+'</div><div class="pmeta">'+p.country+' · '+p.age+'a · ELO '+p.elo+'</div></div><span class="badge '+tCls(p.title)+'">'+p.title+'</span><span class="badge '+al.c+'" style="margin-left:2px">'+al.t+'</span><div style="text-align:right;flex-shrink:0;margin-left:6px"><div style="font-size:12px;font-weight:700;color:var(--amber-text);margin-bottom:3px">'+p.price+'</div><button class="btn btn-sm btn-primary" onclick="buy('+p.id+')"'+(can?'':' disabled')+'>Fichar</button></div></div>';}).join('');document.getElementById('market').innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem"><span style="font-size:14px;font-weight:600">Mercado mundial</span><span style="font-size:13px;font-weight:700;color:var(--amber-text)">⚡ '+coins+'</span></div><p style="font-size:12px;color:var(--text2);margin-bottom:.75rem">Plantilla '+mySquad.length+'/8.'+(mySquad.length>=8?' Vende primero.':' Vender = 70% devuelto.')+'</p><div class="card">'+rows+'</div>';}
function rSeas(){const el=document.getElementById('season');if(!sdone){const pos=[...lg].sort((a,b)=>b.pts-a.pts).findIndex(t=>t.isMe)+1;el.innerHTML='<div class="card"><div class="empty"><p>Temporada en curso · Posición: '+pos+'º</p><p style="font-size:12px;margin-top:.5rem">Ronda '+rn0+'/10</p></div></div>';return;}const rr=mySquad.map(p=>{const ch=ri(-18,28);const nE=p.eloF+ch;const pd=Math.round(ch*1.2);const cls=ch>0?'up':ch<0?'down':'flat';const sym=ch>0?'▲':ch<0?'▼':'=';return'<div class="revrow"><span class="pflag">'+p.flag+'</span><div class="pinfo"><div class="pname">'+p.name+'</div><div class="pmeta">'+p.country+' · ELO congelado: '+p.eloF+'</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:13px;font-weight:700">'+nE+' <span class="'+cls+'">'+sym+Math.abs(ch)+'</span></div><div style="font-size:11px;color:var(--text2)">Valor <span class="'+cls+'">'+(pd>=0?'+':'')+pd+'</span></div></div></div>';}).join('');const fp=[...lg].sort((a,b)=>b.pts-a.pts).findIndex(t=>t.isMe)+1;const prom=fp<=2,relg=fp>=10;const pb=prom?'badge-green':relg?'badge-red':'badge-gray';const pm=prom?'▲ Asciendes':relg?'▼ Desciendes':'Permaneces en Div. 1';el.innerHTML='<div class="card"><div class="card-title">Fin de temporada '+snum+' · '+fp+'º puesto</div><div style="margin-bottom:1rem"><span class="badge '+pb+'" style="font-size:13px;padding:4px 14px">'+pm+'</span></div><div style="font-size:12px;color:var(--text2);margin-bottom:.75rem">Revalorización FIDE — nuevo mes</div>'+rr+'</div><div class="card" style="text-align:center"><p style="font-size:13px;color:var(--text2);margin-bottom:1rem">Plantilla y monedas se mantienen.</p><button class="btn btn-primary" onclick="newS()">Iniciar temporada '+(snum+1)+' →</button></div>';}
function newS(){mySquad.forEach(p=>{const c=ri(-18,28);p.elo=p.eloF+c;p.eloF=p.elo;p.price=Math.max(30,Math.floor(p.elo/10)*10-ri(5,20));p.form=parseFloat((Math.random()*.16-.08).toFixed(2));});rn0=0;lastM=null;sdone=false;hist=[];snum++;lg=TNAMES.map(n=>({name:n,pts:ri(2,22),w:ri(0,7),d:ri(0,4),l:ri(0,5),gd:ri(-10,10),isMe:false}));lg.push({name:'Tu equipo',pts:0,w:0,d:0,l:0,gd:0,isMe:true});lg.sort((a,b)=>b.pts-a.pts);updH();updDot();rAll();showTab('squad');}
function sell(id){const p=mySquad.find(x=>x.id===id);if(!p)return;coins+=Math.floor(p.price*.7);mySquad=mySquad.filter(x=>x.id!==id);mkt.unshift(p);lastM=null;updH();rAll();}
function buy(id){const p=mkt.find(x=>x.id===id);if(!p||coins<p.price||mySquad.length>=8)return;coins-=p.price;p.eloF=p.elo;mySquad.push(p);mkt=mkt.filter(x=>x.id!==id);updH();rAll();}
function showTab(id){document.querySelectorAll('.nav-btn').forEach(t=>t.classList.toggle('active',t.getAttribute('onclick').includes("'"+id+"'")));document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');if(id==='match')rMatch();if(id==='squad')rSq();if(id==='season')rSeas();}
init();
</script>
</body>
</html>
